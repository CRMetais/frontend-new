name: Deploy Frontend para EC2 Pública

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        working-directory: ./frontend-crmetais
        run: |
          npm install
          npm run build

      - name: Deploy para EC2 (SSH rsync)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ubuntu
          TARGET: /home/ubuntu/frontend
          ARGS: "-rltgoDzvO --delete" 
          SOURCE: "frontend-crmetais/dist/"